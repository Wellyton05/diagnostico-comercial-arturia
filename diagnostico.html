<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DiagComercial &mdash; Diagnostico de Politica Comercial</title>
<meta name="description" content="Sistema de diagnostico de politica comercial para industrias e distribuidores"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="assets/docx.bundle.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0F1F3D;--blue:#1E3A6E;--gold:#C9A84C;--gold-lite:#FFFBEB;--red:#C0392B;--red-bg:#FEF2F2;--green:#1a7a45;--green-bg:#F0FDF4;--gray:#F7F8FA;--gray2:#EFF1F5;--border:#E2E5EB;--text:#111827;--muted:#6B7280;--placeholder:#9CA3AF;--white:#FFFFFF;--r:8px;--r-sm:6px;--shadow:0 1px 3px rgba(0,0,0,0.06),0 2px 10px rgba(0,0,0,0.04)}
html,body{height:100%;overflow:hidden}
body{font-family:"DM Sans",sans-serif;background:var(--gray);color:var(--text);font-size:14px;line-height:1.5}
#app{height:100vh;display:flex;flex-direction:column}
.app-header{flex-shrink:0;height:48px;background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:12px;z-index:200;box-shadow:0 1px 8px rgba(0,0,0,0.25)}
.hdr-logo{width:28px;height:28px;background:var(--gold);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.hdr-name{font-family:"Syne",sans-serif;font-weight:800;font-size:14px;color:#fff;letter-spacing:-.3px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hdr-pct{font-size:11px;color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.08);padding:3px 10px;border-radius:99px}
.app-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:228px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-back{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;padding:0 0 8px;display:flex;align-items:center;gap:4px;font-family:"DM Sans",sans-serif;width:100%;text-align:left}
.sb-back:hover{color:var(--text)}
.sb-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-prog-bar{height:2px;background:var(--gray2);border-radius:99px;margin-bottom:3px}
.sb-prog-fill{height:2px;background:var(--gold);border-radius:99px;transition:width .4s ease}
.sb-prog-label{font-size:10px;color:var(--muted)}
.sb-generate{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.btn-generate{width:100%;padding:9px 12px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-generate:hover{background:var(--blue);transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,31,61,0.2)}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .1s}
.sb-item:hover{background:var(--gray)}
.sb-item.active{background:#EFF6FF;border-left-color:var(--blue)}
.sb-item.done{border-left-color:var(--green)}
.sb-item.partial{border-left-color:var(--gold)}
.sb-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-label{font-size:11.5px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item.active .sb-label{color:var(--blue);font-weight:500}
.sb-item.done .sb-label{color:var(--green)}
.sb-check{color:var(--green);font-size:10px;font-weight:700;flex-shrink:0}
.sb-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0}
.sb-footer{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:6px}
.main-area{flex:1;overflow-y:auto;background:var(--gray)}
.main-area::-webkit-scrollbar{width:5px}
.main-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.page-list{max-width:800px;margin:0 auto;padding:28px 28px 60px}
.list-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px}
.list-title{font-family:"Syne",sans-serif;font-size:24px;font-weight:800;color:var(--text)}
.list-sub{font-size:12px;color:var(--muted);margin-top:2px}
.list-header-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.search-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:13px;outline:none;background:var(--white);transition:border .1s;color:var(--text);margin-bottom:12px;display:block}
.search-input:focus{border-color:var(--blue)}
.list-row{display:flex;align-items:center;gap:12px;padding:13px 14px;background:var(--white);border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .12s}
.list-row:hover{border-color:#93C5FD;box-shadow:0 2px 10px rgba(30,58,110,0.07)}
.list-main{flex:1;min-width:0}
.list-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-meta{display:flex;gap:8px;margin-bottom:5px;flex-wrap:wrap}
.list-meta span{font-size:11px;color:var(--muted)}
.list-bar{background:var(--gray2);border-radius:99px;height:3px}
.list-fill{height:3px;border-radius:99px;transition:width .5s}
.list-pct{font-size:13px;font-weight:700;min-width:34px;text-align:right;flex-shrink:0}
.list-actions{display:flex;gap:3px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:5px 7px;font-size:12px;cursor:pointer;transition:all .1s;color:var(--text)}
.icon-btn:hover{background:var(--gray2)}
.icon-btn.danger:hover{background:var(--red-bg);border-color:var(--red)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-sub{font-size:13px}
.step-page{max-width:740px;margin:0 auto;padding:24px 28px 100px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.breadcrumb{font-size:11.5px;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.bc-link{cursor:pointer;transition:color .1s}
.bc-link:hover{color:var(--blue);text-decoration:underline}
.badge-ro{background:#EFF6FF;color:var(--blue);font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;margin-left:4px}
.step-heading{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}
.sh-icon{font-size:26px;flex-shrink:0;margin-top:1px}
.sh-text{flex:1}
.sh-title{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;color:var(--text);line-height:1.1}
.sh-desc{font-size:12.5px;color:var(--muted);margin-top:3px}
.sh-step{font-size:11px;color:var(--muted);background:var(--gray2);padding:3px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.step-footer{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:14px 20px;margin:20px -28px -100px;background:var(--white);border-top:1px solid var(--border);position:sticky;bottom:0;z-index:10}
.step-footer-left{display:flex;justify-content:flex-start}
.step-footer-center{display:flex;justify-content:center}
.step-footer-right{display:flex;justify-content:flex-end;gap:8px}
.notion-block{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.n-sec{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.n-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:10px}
.n-field-group{display:flex;flex-direction:column;gap:3px}
.n-field-group.full{grid-column:1/-1}
.n-field-group.span2{grid-column:span 2}
.n-field-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.n-hint{font-weight:400;text-transform:none;letter-spacing:0;color:var(--placeholder);font-style:italic;font-size:10.5px}
.req{color:var(--red)}
.n-input{padding:7px 9px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text);outline:none;background:var(--white);transition:border .1s;width:100%}
.n-input:focus{border-color:var(--blue);background:#FAFBFF}
.n-input:disabled{background:var(--gray);color:var(--muted)}
.n-ro{font-size:13px;color:var(--text);padding:7px 0;border-bottom:1px dashed var(--border);min-height:30px}
.n-select{padding:7px 9px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:"DM Sans",sans-serif;font-size:12px;color:var(--text);outline:none;background:var(--white);transition:border .1s;width:100%}
.n-select:focus{border-color:var(--blue)}
.n-textarea{padding:9px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:"DM Sans",sans-serif;font-size:13px;color:var(--text);outline:none;background:var(--white);resize:vertical;min-height:90px;line-height:1.55;width:100%;transition:border .1s}
.n-textarea:focus{border-color:var(--blue)}
.part-row{display:grid;grid-template-columns:1fr 1fr 130px 24px;gap:6px;margin-bottom:6px;align-items:center}
.btn-add-row{background:none;border:1px dashed var(--border);border-radius:var(--r-sm);padding:6px 12px;font-size:12px;color:var(--muted);cursor:pointer;width:100%;font-family:"DM Sans",sans-serif;transition:all .1s;margin-top:2px}
.btn-add-row:hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.remove-row{background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;padding:3px;border-radius:3px}
.remove-row:hover{color:var(--red)}
.cnpj-loading{font-size:12px;color:var(--blue);padding:5px 0}
.cnpj-ok{font-size:12px;color:var(--green);padding:5px 0}
.cnpj-error{font-size:12px;color:var(--red);padding:5px 0}
.questions-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.q-card{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.q-card.critical{border-left-color:#FCA5A5}
.q-card.answered{border-left-color:var(--green)}
.q-top{display:flex;gap:10px;padding:13px 14px 8px}
.q-num{width:21px;height:21px;border-radius:5px;background:var(--gray2);color:var(--muted);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.q-card.answered .q-num{background:var(--green-bg);color:var(--green)}
.q-body{flex:1}
.q-text{font-size:13px;font-weight:500;color:var(--text);line-height:1.4}
.q-hint{font-size:11.5px;color:var(--muted);margin-top:5px;padding:6px 9px;background:var(--gold-lite);border-left:2px solid var(--gold);border-radius:0 4px 4px 0;line-height:1.45}
.q-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.qtag{font-size:9px;font-weight:700;letter-spacing:.3px;padding:2px 6px;border-radius:99px;text-transform:uppercase}
.qtag.alta{background:var(--red-bg);color:var(--red)}
.qtag.tipo{background:var(--gray2);color:var(--muted)}
.qtag.done{background:var(--green-bg);color:var(--green)}
.q-answer{padding:2px 14px 12px 45px}
.yn-row{display:flex;gap:7px;margin-bottom:8px}
.yn-btn{flex:1;padding:8px;border-radius:var(--r-sm);border:1px solid var(--border);font-size:12.5px;font-weight:500;cursor:pointer;background:var(--white);transition:all .1s;font-family:"DM Sans",sans-serif;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:5px}
.yn-btn:hover{border-color:var(--blue);color:var(--blue)}
.yn-btn.yes{background:var(--green-bg);border-color:#86EFAC;color:var(--green);font-weight:600}
.yn-btn.nao.no{background:var(--red-bg);border-color:#FCA5A5;color:var(--red);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.chip{padding:5px 11px;border-radius:var(--r-sm);border:1px solid var(--border);font-size:12px;cursor:pointer;background:var(--white);color:var(--text);font-family:"DM Sans",sans-serif;transition:all .1s}
.chip:hover{border-color:var(--blue);background:#EFF6FF;color:var(--blue)}
.chip.sel{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:500}
.chip.multi.sel{background:#EFF6FF;border-color:var(--blue);color:var(--blue);font-weight:500}
.ans-ro{font-size:13px;color:var(--text);padding:6px 0;border-bottom:1px dashed var(--border);margin-bottom:6px;min-height:26px}
.ans-ro.ans-sim{color:var(--green);font-weight:600}
.ans-ro.ans-nao{color:var(--red);font-weight:600}
.obs-wrap{margin-top:6px}
.obs-textarea{padding:7px 9px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:"DM Sans",sans-serif;font-size:12px;color:var(--muted);outline:none;background:var(--gray);resize:vertical;min-height:52px;line-height:1.5;width:100%;transition:border .1s}
.obs-textarea:focus{border-color:var(--gold);background:var(--white);color:var(--text)}
.obs-ro{font-size:11.5px;color:var(--muted);font-style:italic;padding:3px 0}
.obs-lbl{font-weight:600;color:#92400E}
.file-drop{border:1.5px dashed var(--border);border-radius:var(--r);padding:16px;text-align:center;background:var(--gray);transition:all .1s;margin-bottom:8px}
.file-drop:hover{border-color:var(--blue);background:#EFF6FF}
.file-label{display:block;cursor:pointer;font-size:13px;color:var(--muted);line-height:1.6}
.file-label small{font-size:11px;color:var(--placeholder)}
.file-attached{font-size:13px;color:var(--green);display:flex;align-items:center;justify-content:center;gap:8px}
.docs-table{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.docs-hdr{display:grid;grid-template-columns:1fr auto;gap:10px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:0 2px 4px;border-bottom:1px solid var(--border)}
.docs-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:3px 2px}
.docs-name{font-size:13px;color:var(--text)}
.docs-opts{display:flex;gap:4px}
.docs-chip{padding:4px 9px!important;font-size:11px!important}
.docs-ro{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.docs-ro-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid var(--border)}
.docs-s{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase}
.docs-s.obrigatório{background:var(--red-bg);color:var(--red)}
.docs-s.opcional{background:#FEF9C3;color:#854D0E}
.cond-editor{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.cond-hdr{display:grid;grid-template-columns:1fr 1fr 1.5fr 24px;gap:6px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding-bottom:5px;border-bottom:1px solid var(--border)}
.cond-row{display:grid;grid-template-columns:1fr 1fr 1.5fr 24px;gap:6px;align-items:center}
.btn-n{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);font-family:"DM Sans",sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);transition:all .12s;white-space:nowrap;text-decoration:none}
.btn-n:hover{background:var(--gray2);border-color:#C9D1DB}
.btn-n.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-n.primary:hover{background:var(--blue)}
.btn-n.accent{background:var(--gold-lite);color:#92400E;border-color:var(--gold);font-weight:600}
.btn-n.accent:hover{background:var(--gold);color:var(--navy)}
.btn-n.sm{padding:5px 10px;font-size:11.5px}
.btn-n.lg{padding:11px 22px;font-size:14px;font-weight:600}
.btn-n:disabled{opacity:.5;cursor:not-allowed}
.resumo-page{max-width:860px}
.res-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;background:var(--navy);border-radius:var(--r);padding:24px 28px;margin-bottom:16px;color:#fff}
.res-header-left{flex:1}
.res-badge{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.res-empresa{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;line-height:1.1;margin-bottom:6px}
.res-meta{display:flex;flex-wrap:wrap;gap:10px}
.res-meta span{font-size:12px;color:rgba(255,255,255,0.55)}
.res-meta span+span::before{content:"·";margin-right:4px}
.res-header-right{text-align:center;flex-shrink:0}
.res-pct{font-family:"Syne",sans-serif;font-size:44px;font-weight:800;color:var(--gold);line-height:1}
.res-pct span{font-size:22px}
.res-pct-label{font-size:11px;color:rgba(255,255,255,0.5);margin-top:4px}
.res-section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:12px}
.res-section-title{font-family:"Syne",sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.res-bloco-pct{font-size:12px;font-weight:600}
.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:10px}
.res-kv{display:flex;flex-direction:column;gap:2px}
.res-k{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.res-v{font-size:13px;color:var(--text);font-weight:500}
.res-participants{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.res-parts-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.res-part{display:flex;align-items:center;gap:6px;background:var(--gray);border-radius:6px;padding:5px 10px}
.res-part-area{font-size:10px;font-weight:700;background:var(--navy);color:var(--gold);padding:2px 6px;border-radius:4px;flex-shrink:0}
.res-part-name{font-size:12px;font-weight:600;color:var(--text)}
.res-part-cargo{font-size:11px;color:var(--muted)}
.res-qa-list{display:flex;flex-direction:column}
.res-qa-row{display:flex;gap:0;border-bottom:1px solid var(--border);padding:10px 0}
.res-qa-row:last-child{border-bottom:none}
.res-qa-alta{background:linear-gradient(to right,rgba(254,242,242,0.4),transparent)}
.res-qa-left{width:28px;flex-shrink:0;padding-top:1px}
.res-qa-num{width:20px;height:20px;border-radius:4px;background:var(--gray2);color:var(--muted);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.res-qa-answered .res-qa-num{background:var(--green-bg);color:var(--green)}
.res-qa-body{flex:1}
.res-qa-q{font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.res-crit{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;background:var(--red-bg);color:var(--red);text-transform:uppercase;flex-shrink:0;margin-top:1px}
.res-qa-a{font-size:13px;color:var(--text);padding:4px 0;line-height:1.4}
.res-qa-a.res-yn{font-weight:600}
.res-qa-a.res-sim{color:var(--green)}
.res-qa-a.res-nao{color:var(--red)}
.res-empty-a{color:var(--placeholder);font-style:italic;font-size:12px}
.res-chips-ro{display:flex;flex-wrap:wrap;gap:4px}
.res-chip{background:var(--gray2);color:var(--text);font-size:11px;padding:3px 9px;border-radius:4px;font-weight:500}
.res-docs-ro{display:flex;flex-direction:column;gap:3px}
.res-doc{font-size:12px;display:block}
.res-doc b{font-weight:600}
.res-doc-obrig{color:var(--red)}
.res-doc-opc{color:#854D0E}
.res-doc-no{color:var(--muted)}
.res-qa-obs{font-size:11.5px;color:#92400E;background:var(--gold-lite);border-left:2px solid var(--gold);padding:4px 8px;margin-top:5px;border-radius:0 4px 4px 0}
.res-cond-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
.res-cond-table th{background:var(--gray2);padding:5px 10px;text-align:left;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.res-cond-table td{padding:5px 10px;border-bottom:1px solid var(--border)}
.res-actions{display:flex;gap:8px;flex-wrap:wrap;padding:20px 0 8px;border-top:1px solid var(--border);margin-top:8px}
.toast{position:fixed;bottom:18px;right:18px;background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:500;z-index:9999;transform:translateY(50px);opacity:0;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:var(--red)}
@media print{.app-header,.sidebar,.step-footer,.sb-generate,.sb-footer,.res-actions,.breadcrumb{display:none!important}.main-area{overflow:visible!important}.res-section{break-inside:avoid}}
@media(max-width:640px){.sidebar{display:none}.step-page,.page-list,.resumo-page{padding:16px 14px 80px}.n-row{grid-template-columns:1fr}.part-row{grid-template-columns:1fr 1fr}.step-footer{margin:20px -14px -80px;padding:12px 14px}.res-header{flex-direction:column}.res-actions{flex-direction:column}}</style>
</head>

</header>
<div id="app"></div>
<div class="toast" id="toast"></div>
