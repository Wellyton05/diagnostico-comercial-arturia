<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard - DiagComercial</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0F1F3D;--blue:#1E3A6E;--accent:#C9A84C;--gray:#F2F4F7;--text:#1A2537;--muted:#64748B;--white:#FFFFFF;--red:#C0392B;}
body{font-family:"DM Sans",sans-serif;background:#EEF1F7;color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.app-header{background:var(--navy);height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,0.3);flex-shrink:0}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr-name{font-family:"Syne",sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:-.3px}
.hdr-right{display:flex;align-items:center;gap:16px}
.user-info{font-size:13px;color:rgba(255,255,255,0.7);display:flex;align-items:center;gap:8px}
.logout-btn{background:rgba(255,255,255,0.1);border:none;color:white;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .2s}
.logout-btn:hover{background:rgba(255,255,255,0.2)}

.container{max-width:1000px;margin:40px auto;padding:0 24px;width:100%}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.page-title{font-family:"Syne",sans-serif;font-size:28px;font-weight:800;color:var(--navy)}
.btn-new{background:var(--accent);color:var(--navy);padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;box-shadow:0 4px 14px rgba(201,168,76,0.3);transition:transform .2s}
.btn-new:hover{transform:translateY(-2px)}

.diags-list{display:grid;grid-template-columns:1fr;gap:16px}
.diag-card{background:var(--white);border-radius:12px;padding:24px;box-shadow:0 2px 16px rgba(15,31,61,0.06);display:flex;justify-content:space-between;align-items:center;border-left:4px solid var(--accent)}
.diag-info h3{font-family:"Syne",sans-serif;font-size:18px;color:var(--navy);margin-bottom:6px}
.diag-meta{font-size:13px;color:var(--muted);display:flex;gap:16px}
.diag-meta span{display:flex;align-items:center;gap:6px}
.diag-actions{display:flex;gap:10px}
.btn-action{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;border:1.5px solid transparent;transition:all .2s;font-family:"DM Sans"}
.btn-edit{background:#F8FAFC;color:var(--blue);border-color:#CBD5E1}
.btn-edit:hover{background:var(--blue);color:white;border-color:var(--blue)}
.btn-del{background:white;color:var(--red);border-color:#FCA5A5}
.btn-del:hover{background:var(--red);color:white;border-color:var(--red)}
.empty-state{text-align:center;padding:60px 20px;background:white;border-radius:12px;box-shadow:0 2px 16px rgba(15,31,61,0.06)}
.empty-state h3{margin-bottom:10px;color:var(--navy);font-family:"Syne",sans-serif;font-size:20px}
.empty-state p{color:var(--muted);margin-bottom:20px}

@media(max-width:700px){.diag-card{flex-direction:column;align-items:flex-start;gap:16px}.diag-actions{width:100%;justify-content:flex-start}}
</style>
</head>
<body>
<header class="app-header">
  <div class="hdr-brand">
    <div class="hdr-logo">&#128203;</div>
    <div class="hdr-name">DiagComercial</div>
  </div>
  <div class="hdr-right">
    <div class="user-info" id="userName">Carregando...</div>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>
</header>
<div class="container">
    <div class="top-bar">
        <h1 class="page-title">Meus Diagnósticos</h1>
        <a href="diagnostico.html" class="btn-new">+ Novo Diagnóstico</a>
    </div>
    <div class="diags-list" id="diagsList">
        <!-- populated by js -->
        <div class="empty-state">Carregando...</div>
    </div>
</div>
<script src="assets/auth.js"></script>
<script src="assets/dashboard.js"></script>
</body>
</html>
