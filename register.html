<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadastro - DiagComercial</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0F1F3D;--blue:#1E3A6E;--gold:#C9A84C;--gold-glow:rgba(201,168,76,0.35);--gray:#F2F4F7;--text:#1A2537;--muted:#64748B;--r:10px}
body{font-family:"DM Sans",sans-serif;background:linear-gradient(145deg,#0B1628 0%,#162D55 50%,#1E3A6E 100%);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(201,168,76,0.04) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
body::after{content:"";position:absolute;top:-30%;left:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.auth-card{background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);padding:44px 36px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.25),0 0 0 1px rgba(255,255,255,0.1);width:100%;max-width:420px;border-top:4px solid var(--gold);position:relative;animation:cardIn .5s ease forwards}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:36px}
.logo{width:44px;height:44px;background:var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px var(--gold-glow)}
.name{font-family:"Syne",sans-serif;font-weight:800;font-size:24px;color:var(--navy);letter-spacing:-.3px}
.form-group{margin-bottom:22px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.form-input{width:100%;padding:13px 16px;border:1.5px solid #E2E8F0;border-radius:var(--r);font-family:"DM Sans",sans-serif;font-size:14px;background:#FAFBFD;transition:all .2s;color:var(--text)}
.form-input:focus{border-color:var(--blue);outline:none;background:white;box-shadow:0 0 0 3px rgba(30,58,110,0.08)}
.form-input::placeholder{color:#A0AEC0}
.btn{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:var(--r);font-family:"DM Sans",sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .25s;box-shadow:0 4px 16px rgba(15,31,61,0.2)}
.btn:hover{background:var(--blue);transform:translateY(-1px);box-shadow:0 8px 24px rgba(15,31,61,0.25)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.link{display:block;text-align:center;margin-top:24px;font-size:14px;color:var(--blue);text-decoration:none;font-weight:500;transition:color .2s}
.link:hover{color:var(--gold);text-decoration:underline}
.error{color:#C0392B;font-size:13px;text-align:center;margin-bottom:16px;display:none;background:#FEF2F2;border:1px solid #FCA5A5;padding:10px 14px;border-radius:8px}
@media(max-width:480px){.auth-card{padding:32px 24px}.name{font-size:20px}}
</style>
</head>
<body>
<div class="auth-card">
    <div class="brand">
        <div class="logo">&#128203;</div>
        <div class="name">DiagComercial</div>
    </div>
    <div class="error" id="errorMsg"></div>
    <form id="registerForm">
        <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-input" id="name" required placeholder="Seu nome">
        </div>
        <div class="form-group">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-input" id="email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" class="form-input" id="password" required placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="btn" id="submitBtn">Criar Conta</button>
    </form>
    <a href="login.html" class="link">Já tem uma conta? Faça Login</a>
</div>
<script src="assets/auth.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    btn.disabled = true; btn.textContent = 'Aguarde...'; err.style.display = 'none';
    
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, email, password})
        });
        const data = await res.json();
        if(res.ok) {
            localStorage.setItem('diag_token', data.token);
            window.location.href = 'diagnostico.html';
        } else {
            err.textContent = data.error; err.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Criar Conta';
        }
    } catch(e) {
        err.textContent = 'Erro ao conectar no servidor'; err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Criar Conta';
    }
});
</script>
</body>
</html>
