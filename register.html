<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cadastro - DiagComercial</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0F1F3D;--blue:#1E3A6E;--accent:#C9A84C;--gray:#F2F4F7;--text:#1A2537;--muted:#64748B;}
body{font-family:"DM Sans",sans-serif;background:#EEF1F7;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:white;padding:40px;border-radius:12px;box-shadow:0 8px 40px rgba(15,31,61,0.1);width:100%;max-width:400px;border-top:4px solid var(--accent);}
.brand{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:32px}
.logo{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.name{font-family:"Syne",sans-serif;font-weight:800;font-size:22px;color:var(--navy);}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;border:1.5px solid #CBD5E1;border-radius:8px;font-family:"DM Sans",sans-serif;font-size:14px;}
.form-input:focus{border-color:var(--blue);outline:none}
.btn{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:8px;font-family:"DM Sans",sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:background .2s}
.btn:hover{background:var(--blue)}
.link{display:block;text-align:center;margin-top:20px;font-size:14px;color:var(--blue);text-decoration:none;font-weight:500}
.link:hover{text-decoration:underline}
.error{color:#C0392B;font-size:13px;text-align:center;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="auth-card">
    <div class="brand">
        <div class="logo">&#128203;</div>
        <div class="name">DiagComercial</div>
    </div>
    <div class="error" id="errorMsg"></div>
    <form id="registerForm">
        <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input type="text" class="form-input" id="name" required placeholder="Seu nome">
        </div>
        <div class="form-group">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-input" id="email" required placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" class="form-input" id="password" required placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="btn" id="submitBtn">Criar Conta</button>
    </form>
    <a href="login.html" class="link">Já tem uma conta? Faça Login</a>
</div>
<script src="assets/auth.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    btn.disabled = true; btn.textContent = 'Aguarde...'; err.style.display = 'none';
    
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name, email, password})
        });
        const data = await res.json();
        if(res.ok) {
            localStorage.setItem('diag_token', data.token);
            window.location.href = 'dashboard.html';
        } else {
            err.textContent = data.error; err.style.display = 'block';
            btn.disabled = false; btn.textContent = 'Criar Conta';
        }
    } catch(e) {
        err.textContent = 'Erro ao conectar no servidor'; err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Criar Conta';
    }
});
</script>
</body>
</html>
